<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Q4 Seatwork 1</title>
  <style>

    body{
        background-image: url(geometric-dark-background-with-gradient-shapes-composition-good-for-posters-design-illustration-vector.jpg);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        margin: 0px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    html, body {
        height: 100%;
        margin: 0px;
    }

    .box{
        background-color: rgba(196, 151, 210);
        border-radius: 10px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        padding: 20px;
        max-width: 450px;
        max-height: 450px;
        width: 100%;
        text-align: center;
        margin: 10px;
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5)
    }

  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css " rel="stylesheet">
</head>
<body>

    <div class="box">
        <h1 style="color: #69135a;">Welcome!</h1>

        <button type="button" onclick="login()" style="height: 40px; border-radius: 10px; border-width: 0px; background-color: white; color: #69135a; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3)">Click here to log-in to your account.</button>
    </div>

    <script>

        function login() {
            var C_Username = "imsohungry"
            var C_Password = "iwanticecream"

            var attempts = 0;
            var maxAttempts = 3;

            while(attempts < maxAttempts){
                var username = prompt("Enter Username");
                var password = prompt("Enter Password");

            if(username === C_Username && password === C_Password){
                alert("Log-in Successful")
                break;
            }

            else{
                attempts++;
                alert("Log-in Failed. Attempts left:" + (maxAttempts-attempts))
            }

            if(attempts >= maxAttempts){
                alert("Log-in Unsuccessful.")
            }

            }

        }

        </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js "></script>
</body>
</html>
